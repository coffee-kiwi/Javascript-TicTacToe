<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naughts & Crosses</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div>
            <h1>Welcome to Tic-Tac-Toe / Naughts and Crosses</h1>
        </div>
    </header>

    <main>

        <div class="x-side">
            <p>X</p>
            <hr>
            <p id="scoreX"></p> 
        </div>
        <div class="top-middle">
            <div id="turn">
                
            </div>
            <div class="btns">
                <button type="button" id="start">Restart Game</button>
                <button type="button" id="toggle-player">Change starting player</button>
            </div>
        </div>

        <section id="gameboard">
            
        </section>

        <div class="space">

        </div>

        <div class="y-side">
            <p>Y</p> 
            <hr>
            <p id="scoreY"></p> 
        </div>


    </main>
</body>
</html>
